{% from "macros/flash.html" import flash %}

{% if flash_message %}
  {{ flash(flash_kind, flash_message) }}
{% endif %}

{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}

<section>
  <h1 class="page-title">Add Account</h1>
  <div class="section-card max-w-lg">
    <div class="p-6">
      <form hx-post="/ui/accounts" hx-target="#content">
        <div class="form-group">
          <label for="name" class="form-label">Name</label>
          <input type="text" name="name" id="name" placeholder="bofa_checking" required
            value="{{ form_data.get('name', '') }}"
            class="form-input">
        </div>
        <div class="form-group">
          <label for="account_type" class="form-label">Type</label>
          <select name="account_type" id="account_type" required class="form-select">
            <option value="">Select type...</option>
            {% for t in available_types %}
            <option value="{{ t }}"
              {% if form_data.get('account_type') == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="description" class="form-label">Description</label>
          <input type="text" name="description" id="description"
            placeholder="Bank of America Checking Account" required
            value="{{ form_data.get('description', '') }}"
            class="form-input">
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
    </div>
  </div>
</section>
