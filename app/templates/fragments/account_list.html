<section>
  <h2>Accounts</h2>
  <p><button hx-get="/ui/accounts/new" hx-target="#content" hx-push-url="true">Add Account</button></p>
  {% if accounts %}
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      {% for account in accounts %}
      <tr>
        <td>{{ account.name }}</td>
        <td>{{ account.account_type }}</td>
        <td>{{ account.description }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p>No accounts found.</p>
  {% endif %}
</section>
