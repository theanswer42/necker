{% if error %}
<div class="error-box">{{ error }}</div>
{% endif %}
<section>
  <h1 class="page-title">Import Transactions</h1>
  {% if accounts %}
  <div class="section-card max-w-lg">
    <div class="p-6">
      <form hx-post="/ui/imports" hx-target="#content" hx-encoding="multipart/form-data">
        <div class="form-group">
          <label for="account_id" class="form-label">Account</label>
          <select name="account_id" id="account_id" required class="form-select">
            <option value="">Select account...</option>
            {% for account in accounts %}
            <option value="{{ account.id }}"
              {% if selected_account_id == account.id %}selected{% endif %}>
              {{ account.name }} ({{ account.account_type }})
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="csv_file" class="form-label">CSV File</label>
          <input type="file" name="csv_file" id="csv_file" accept=".csv" required
            class="block w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:text-sm file:font-medium file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
        </div>
        <button type="submit" class="btn-primary">Import</button>
      </form>
    </div>
  </div>
  {% else %}
  <p class="text-gray-600 text-sm">
    No accounts found.
    <a hx-get="/ui/accounts" hx-target="#content" hx-push-url="true"
       class="text-blue-600 hover:underline cursor-pointer">Create an account</a> first.
  </p>
  {% endif %}
</section>
