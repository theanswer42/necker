{% macro flash(kind, message) %}
<div id="flash"
     hx-swap-oob="outerHTML"
     role="status"
     aria-live="polite"
     class="px-3 py-1 rounded text-sm font-medium
            {% if kind == 'success' %}bg-green-100 text-green-800{% endif %}
            {% if kind == 'error' %}bg-red-100 text-red-800{% endif %}
            {% if kind == 'info' %}bg-blue-100 text-blue-800{% endif %}">
  {{ message }}
</div>
{% endmacro %}
